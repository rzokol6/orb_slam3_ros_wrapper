%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters. Adjusted for your simulated pinhole camera
#--------------------------------------------------------------------------------------------

Camera.type: "PinHole"
Camera.width: 640
Camera.height: 480

Camera.fx: 521.93325
Camera.fy: 521.93327
Camera.cx: 320.0
Camera.cy: 240.0

# No distortion
Camera.k1: 0.0
Camera.k2: 0.0
Camera.p1: 0.0
Camera.p2: 0.0

# Camera frames per second (adjust if needed)
Camera.fps: 30.0

# Color order (simulation usually outputs RGB)
Camera.RGB: 1

#--------------------------------------------------------------------------------------------
# ORB Parameters (tuned for flat indoor textures)
#--------------------------------------------------------------------------------------------

# Maximum number of ORB features to extract per frame
ORBextractor.nFeatures: 2200       # slightly higher than default

# Pyramid scale factor
ORBextractor.scaleFactor: 1.1      # finer scale steps, helps catch weak features

# Number of pyramid levels
ORBextractor.nLevels: 9            # more levels, captures smaller corners

# FAST thresholds
ORBextractor.iniThFAST: 7          # initial threshold, lower = more sensitive
ORBextractor.minThFAST: 3          # minimum threshold, allows detection in very flat areas

# Optional: cap max features per level (not in original ORB-SLAM3 yaml)
# This is advanced; usually not needed unless CPU spikes
#ORBextractor.nFeaturesPerLevel: [800, 600, 400, 300, 100, 50, 30, 20, 10]

# Transformation from camera 0 to body-frame (imu)
IMU.T_b_c1: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [0.0148655429818, -0.999880929698, 0.00414029679422, -0.0216401454975,
         0.999557249008, 0.0149672133247, 0.025715529948, -0.064676986768,
         -0.0257744366974, 0.00375618835797, 0.999660727178, 0.00981073058949,
         0.0, 0.0, 0.0, 1.0]

# IMU noise
IMU.NoiseGyro: 1.7e-04 # 1.6968e-04
IMU.NoiseAcc: 2.0e-03 # 2.0000e-3
IMU.GyroWalk: 1.9393e-05
IMU.AccWalk: 3.e-03 # 3.0000e-3
IMU.Frequency: 200.0

#--------------------------------------------------------------------------------------------
# Viewer
#--------------------------------------------------------------------------------------------

Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3
Viewer.ViewpointX: 0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500
